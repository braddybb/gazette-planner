


<!DOCTYPE html>

<title>Gazette News — Editor Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0000EE;
  --blue-lt:#EEF0FF;
  --blue-dk:#0000AA;
  --ink:#111111;
  --white:#ffffff;
  --acid:#EEFF00;
  --acid-dk:#4A5200;
  --grey-lt:#F5F4F1;
  --grey-md:#888888;
  --grey-dk:#444444;
  --cream:#FFFDE7;
  --cream-dk:#6B4400;
  --border:#DDDDDD;
  --success:#15803D;
  --success-lt:#F0FDF4;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8f8f6;color:#111;min-height:100vh}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-card{background:#fff;border:0.5px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px}
.login-logo{font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--grey-md);text-transform:uppercase;margin-bottom:1.5rem}
.login-title{font-size:24px;font-weight:600;color:var(--ink);margin-bottom:.4rem}
.login-sub{font-size:13px;color:var(--grey-md);margin-bottom:2rem;line-height:1.5}
.login-field{margin-bottom:1rem}
.login-label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--grey-dk);margin-bottom:.4rem;display:block}
.login-field input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-err{font-size:13px;color:#cc0000;margin-top:.75rem;display:none}
.login-hint{font-size:12px;color:var(--grey-md);margin-top:1rem;text-align:center}

/* ── HEADER ── */
#dashboard{display:none}
.app-header{background:var(--ink);padding:0 2rem;display:flex;align-items:center;height:52px;gap:1.5rem;position:sticky;top:0;z-index:100}
.app-wordmark{font-size:11px;font-weight:600;letter-spacing:.15em;color:#666;text-transform:uppercase}
.app-divider{width:1px;height:16px;background:#333}
.header-title{font-size:13px;color:#ccc;font-weight:500}
.header-spacer{flex:1}
.week-selector{display:flex;align-items:center;gap:8px}
.week-selector label{font-size:12px;color:#888}
.week-selector input{background:#1a1a1a;border:0.5px solid #333;border-radius:6px;padding:4px 10px;font-size:13px;color:#ccc;font-family:inherit;outline:none;width:160px}
.week-selector input:focus{border-color:#555}
.refresh-btn{font-size:12px;color:#555;background:none;border:0.5px solid #333;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.refresh-btn:hover{border-color:#555;color:#888}
.signout-btn{font-size:12px;color:#555;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px}
.signout-btn:hover{color:#888}

/* ── NETWORK SUMMARY ── */
.network-bar{background:#fff;border-bottom:0.5px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.net-stat{display:flex;flex-direction:column;gap:2px}
.net-num{font-size:24px;font-weight:600;color:var(--ink)}
.net-label{font-size:11px;color:var(--grey-md);text-transform:uppercase;letter-spacing:.07em}
.net-divider{width:1px;height:40px;background:var(--border)}
.net-track-wrap{flex:1;min-width:200px}
.net-track-label{font-size:11px;color:var(--grey-md);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.net-track{height:8px;background:var(--grey-lt);border-radius:4px;overflow:hidden}
.net-fill{height:100%;border-radius:4px;background:var(--blue);transition:width .5s ease}

/* ── REPORTER GRID ── */
.reporter-grid{padding:1.5rem 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;max-width:1400px;margin:0 auto}

/* ── REPORTER CARD ── */
.rep-card{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.rep-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.rep-header{background:var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.rep-name{font-size:15px;font-weight:600;color:#fff}
.rep-pub{font-size:11px;color:#666;margin-top:2px}
.rep-filed-big{font-size:22px;font-weight:600;color:#fff}
.rep-filed-sub{font-size:10px;color:#555;text-align:right;margin-top:1px}
.rep-progress{padding:12px 16px;border-bottom:0.5px solid var(--border)}
.rep-track{height:5px;background:var(--grey-lt);border-radius:3px;overflow:hidden;margin-bottom:10px}
.rep-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .4s ease}
.rep-pills{display:flex;gap:6px;flex-wrap:wrap}
.rpill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;border:0.5px solid}
.rpill-std{background:var(--blue-lt);color:var(--blue-dk);border-color:#AABBEE}
.rpill-imp{background:#1a1a1a;color:#fff;border-color:#333}
.rpill-life{background:var(--cream);color:var(--cream-dk);border-color:#DDD0A0}
.rep-stories{padding:0}
.story-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:0.5px solid var(--border)}
.story-row:last-child{border-bottom:none}
.story-num{font-size:11px;font-weight:600;width:24px;color:var(--grey-md)}
.story-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-std{background:var(--blue)}
.dot-imp{background:var(--ink)}
.dot-life{background:var(--acid-dk)}
.story-headline{font-size:13px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.story-headline.empty{color:var(--grey-md);font-style:italic}
.story-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.story-day{font-size:11px;color:var(--grey-md);background:var(--grey-lt);padding:2px 6px;border-radius:4px}
.filed-tick{font-size:13px;color:var(--success)}
.not-filed{font-size:13px;color:var(--border)}

/* ── DRILL DOWN ── */
#drilldown{display:none;padding:1.5rem 2rem;max-width:900px;margin:0 auto}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:1.5rem;font-weight:500}
.back-btn:hover{text-decoration:underline}
.drill-header{margin-bottom:1.5rem}
.drill-name{font-size:24px;font-weight:600;color:var(--ink)}
.drill-pub{font-size:14px;color:var(--grey-md);margin-top:2px}
.drill-stories{display:flex;flex-direction:column;gap:10px}
.drill-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.drill-card-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px}
.drill-card-hdr.std{background:var(--blue)}
.drill-card-hdr.imp{background:var(--ink)}
.drill-card-hdr.life{background:var(--acid)}
.drill-num{font-size:24px;font-weight:600;min-width:34px}
.drill-num.std,.drill-num.imp{color:#fff}
.drill-num.life{color:var(--acid-dk)}
.drill-type{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.drill-type.std{color:#AABBFF}
.drill-type.imp{color:#777}
.drill-type.life{color:var(--acid-dk)}
.drill-headline-hdr{font-size:13px;font-weight:500}
.drill-headline-hdr.std,.drill-headline-hdr.imp{color:#fff}
.drill-headline-hdr.life{color:var(--acid-dk)}
.drill-headline-hdr.empty{opacity:.4;font-style:italic;font-weight:400}
.drill-filed-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.drill-filed-badge.std{background:rgba(255,255,255,.2);color:#fff}
.drill-filed-badge.imp{background:rgba(255,255,255,.15);color:#aaa}
.drill-filed-badge.life{background:rgba(0,0,0,.1);color:var(--acid-dk)}
.note-form{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.note-form textarea{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;resize:none;min-height:60px;outline:none}
.note-form textarea:focus{border-color:var(--blue)}
.note-send-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;align-self:flex-end}
.note-send-btn:hover{opacity:.88}
.note-sent{font-size:12px;color:var(--success);display:none;align-self:flex-end;padding-bottom:8px}
.existing-note{background:#FFF9C4;border:1px solid #F0E060;border-radius:6px;padding:8px 12px;font-size:12px;color:#5A4A00;margin-top:8px}
.existing-note-label{font-weight:600;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#8A6A00;margin-bottom:3px}
.drill-body{padding:1rem 1.25rem}
.drill-field{margin-bottom:10px;display:flex;gap:8px}
.drill-field:last-child{margin-bottom:0}
.drill-field-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--grey-md);min-width:90px;padding-top:1px}
.drill-field-val{font-size:13px;color:var(--ink);line-height:1.5;flex:1}
.drill-field-val.empty{color:var(--grey-md);font-style:italic}
.drill-checks{display:flex;flex-wrap:wrap;gap:4px 10px}
.dcheck{font-size:12px;padding:2px 8px;border-radius:10px;border:0.5px solid}

/* ── LOADING ── */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:1rem}
.loading-spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--grey-md)}
.empty-state{padding:3rem;text-align:center;color:var(--grey-md);font-size:14px}

/* ── Editorial Calendar Strip (editor, dark) ── */
.ecal-section{max-width:1400px;margin:0 auto;padding:1.25rem 2rem 0}
.ecal-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.ecal-head h2{font-size:14px;font-weight:700;letter-spacing:-.01em;color:#fff;margin:0}
.ecal-head .ecal-sub{font-size:11px;color:#888}
.ecal-strip{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 14px;scroll-snap-type:x mandatory}
.ecal-strip::-webkit-scrollbar{height:6px}
.ecal-strip::-webkit-scrollbar-track{background:transparent}
.ecal-strip::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.ecal-card{
  flex:0 0 240px;scroll-snap-align:start;
  background:#161616;border:0.5px solid #2a2a2a;border-radius:12px;
  padding:14px;display:flex;flex-direction:column;gap:8px;min-height:104px;
  transition:transform .18s cubic-bezier(.2,.7,.3,1),border-color .18s;
}
.ecal-card:hover{transform:translateY(-2px);border-color:#444}
.ecal-chip{align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 8px;border-radius:999px;
  background:#1e2a4a;color:#9db4ff;white-space:nowrap}
.ecal-chip.soon{background:#3a1e14;color:#ff9d72}
.ecal-chip.tbc{background:#262626;color:#999}
.ecal-moment{font-size:13px;font-weight:600;line-height:1.3;color:#f0f0f0;letter-spacing:-.01em}
.ecal-why{font-size:11.5px;line-height:1.45;color:#999;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ecal-card.expanded .ecal-why{-webkit-line-clamp:unset;overflow:visible}
.ecal-more{font-size:10.5px;font-weight:600;color:#9db4ff;cursor:pointer;align-self:flex-start}

/* ── Clear note button ── */
.note-clear-btn{background:none;border:0.5px solid var(--border);color:var(--grey-md);
  border-radius:6px;padding:8px 12px;font-size:13px;font-weight:500;cursor:pointer;
  font-family:inherit;align-self:flex-end;transition:all .15s}
.note-clear-btn:hover{border-color:#cc0000;color:#cc0000}
.note-form-btns{display:flex;gap:8px;align-self:flex-end;align-items:center}

</style>

</div>

function getStoryDefs(pub) {

let WEEK = '';

async function supaFetch(path) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
    }
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}


function getMondayOf(dateStr) {
  if (!dateStr) return dateStr;
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const diff = (day === 0) ? -6 : 1 - day; // adjust to Monday
  d.setDate(d.getDate() + diff);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return yyyy + '-' + mm + '-' + dd;
}

function checkLogin() {
  const pass = document.getElementById('inp-password').value;
  const week = document.getElementById('inp-week').value.trim();
  const err  = document.getElementById('login-err');
  if (pass !== EDITOR_PASS) { err.style.display='block'; return; }
  if (!week) { err.style.display='block'; err.textContent='Please enter the week.'; return; }
  err.style.display='none';
  WEEK = getMondayOf(week);
  // Persist full session
  localStorage.setItem('gz_editor_session', JSON.stringify({ pass, week: WEEK }));
  localStorage.setItem('gz_editor_week', WEEK);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('week-inp').value = WEEK;
  loadWeek();
}

function editorSignOut() {
  localStorage.removeItem('gz_editor_session');
  localStorage.removeItem('gz_editor_week');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-password').value = '';
}

let editorPollTimer = null;

async function loadWeek() {
  const inp = document.getElementById('week-inp');
  if (inp.value.trim()) WEEK = getMondayOf(inp.value.trim());
  const grid = document.getElementById('reporter-grid');
  const netBar = document.getElementById('network-bar');
  grid.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">Loading reporter data...</div></div>';
  netBar.innerHTML = '';

  try {
    await refreshData();
    initEditorRealtime();
    // Polling fallback — refresh every 20s in case realtime is unavailable
    if (editorPollTimer) clearInterval(editorPollTimer);
    editorPollTimer = setInterval(refreshDataQuietly, 20000);
  } catch(e) {
    grid.innerHTML = '<div class="empty-state">Error loading data. Check connection.</div>';
  }
}

// Full refresh with loading state
async function refreshData() {
  const rows = await supaFetch(
    `${TABLE}?week_of=eq.${encodeURIComponent(WEEK)}&select=*&order=reporter.asc`
  );
  ALL_DATA = {};
  rows.forEach(r => {
    const key = r.reporter + '|' + r.publication;
    if (!ALL_DATA[key]) ALL_DATA[key] = {};
    ALL_DATA[key][r.story_num] = r;
  });
  renderNetworkBar();
  renderEditorCalendar();
  renderGrid();
}

// Quiet background refresh — no loading spinner, preserves open drilldown
async function refreshDataQuietly() {
  if (!WEEK) return;
  try {
    const rows = await supaFetch(
      `${TABLE}?week_of=eq.${encodeURIComponent(WEEK)}&select=*&order=reporter.asc`
    );
    const fresh = {};
    rows.forEach(r => {
      const key = r.reporter + '|' + r.publication;
      if (!fresh[key]) fresh[key] = {};
      fresh[key][r.story_num] = r;
    });
    ALL_DATA = fresh;
    renderNetworkBar();
    // Only re-render grid if drilldown isn't open (don't disrupt active editing)
    const drilldown = document.getElementById('drilldown');
    const drillOpen = drilldown && drilldown.style.display !== 'none';
    if (!drillOpen) {
      renderGrid();
    } else {
      // Refresh the open drilldown with fresh data
      const nameEl = document.getElementById('drill-name');
      const pubEl  = document.getElementById('drill-pub');
      if (nameEl && pubEl) {
        const key = nameEl.textContent + '|' + pubEl.textContent;
        const container = document.getElementById('drill-stories');
        if (container && ALL_DATA[key]) {
          // Only refresh if the editor isn't actively typing a note
          const activeEl = document.activeElement;
          const typingNote = activeEl && activeEl.tagName === 'TEXTAREA';
          if (!typingNote) {
            container.innerHTML = '';
            getStoryDefs(pubEl.textContent).forEach(s => {
              container.appendChild(buildDrillCard(
                s, ALL_DATA[key][s.n], nameEl.textContent, pubEl.textContent, WEEK
              ));
            });
          }
        }
      }
    }
  } catch(e) {
    // Silent — don't disrupt the editor on a failed background poll
  }
}

let editorSupabase = null;
let editorChannel = null;

function initEditorRealtime() {
  try {
    if (!editorSupabase) editorSupabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    if (editorChannel) editorSupabase.removeChannel(editorChannel);
    editorChannel = editorSupabase
      .channel('editor-dashboard')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'planner_stories',
      }, payload => {
        const row = payload.new;
        if (!row || row.week_of !== WEEK) return;
        // Merge into local cache, preserving existing data
        const key = row.reporter + '|' + row.publication;
        if (!ALL_DATA[key]) ALL_DATA[key] = {};
        ALL_DATA[key][row.story_num] = Object.assign(
          {}, ALL_DATA[key][row.story_num] || {}, row
        );
        // Refresh the network bar and grid live
        renderNetworkBar();
        renderGrid();
        // If drilldown is open for this reporter, refresh it too
        const drilldown = document.getElementById('drilldown');
        if (drilldown && drilldown.style.display !== 'none') {
          const nameEl = document.getElementById('drill-name');
          const pubEl  = document.getElementById('drill-pub');
          if (nameEl && pubEl &&
              nameEl.textContent === row.reporter &&
              pubEl.textContent  === row.publication) {
            const container = document.getElementById('drill-stories');
            container.innerHTML = '';
            getStoryDefs(row.publication).forEach(s => {
              container.appendChild(buildDrillCard(
                s, ALL_DATA[key][s.n], row.reporter, row.publication, WEEK
              ));
            });
          }
        }
      })
      .subscribe();
    console.log('Editor realtime connected');
  } catch(e) {
    console.warn('Editor realtime unavailable');
  }
}

function getReporterData(reporter, pub) {
  return ALL_DATA[reporter + '|' + pub] || {};
}

function getFiledCount(data) {
  return STORY_DEFS.filter(s => data[s.n] && data[s.n].filed).length;
}

function renderEditorCalendar() {
  const container = document.getElementById('ecal-container');
  if (!container) return;
  // Editor sees all moments, sorted as in the calendar
  const moments = CALENDAR_MOMENTS;
  if (!moments.length) { container.innerHTML = ''; return; }

  function chipClass(tf) {
    const t = tf.toLowerCase();
    if (t.includes('tbc') || t.includes('imminent') || t.includes('unknown')) return 'tbc';
    if (t.includes('june') || t.includes('july') || t.includes('end of')) return 'soon';
    return '';
  }

  let h = '<div class="ecal-section">';
  h += '<div class="ecal-head"><h2>On the radar</h2><span class="ecal-sub">Upcoming Victorian reporting moments across the network</span></div>';
  h += '<div class="ecal-strip">';
  moments.forEach((m, i) => {
    const brandTags = m.brands.join(' · ');
    h += '<div class="ecal-card" id="ecal-card-' + i + '">';
    h += '<span class="ecal-chip ' + chipClass(m.timeframe) + '">' + esc(m.timeframe) + '</span>';
    h += '<div class="ecal-moment">' + esc(m.moment) + '</div>';
    if (m.why) {
      h += '<div class="ecal-why" id="ecal-why-' + i + '">' + esc(m.why) + '</div>';
      if (m.why.length > 110) {
        h += '<span class="ecal-more" onclick="toggleEcalWhy(' + i + ')">Read more</span>';
      }
    }
    h += '</div>';
  });
  h += '</div></div>';
  container.innerHTML = h;
}

function toggleEcalWhy(i) {
  const card = document.getElementById('ecal-card-' + i);
  if (!card) return;
  const more = card.querySelector('.ecal-more');
  const expanded = card.classList.toggle('expanded');
  if (more) more.textContent = expanded ? 'Show less' : 'Read more';
}

function renderNetworkBar() {
  const bar = document.getElementById('network-bar');
  let totalFiled = 0;
  let totalStories = REPORTERS.length * 8;
  REPORTERS.forEach(r => {
    const data = getReporterData(r.name, r.pub);
    totalFiled += getFiledCount(data);
  });
  const pct = Math.round(totalFiled / totalStories * 100);
  function fmtWk(ds) {
    try {
      const m = new Date(ds+'T00:00:00');
      const s = new Date(m); s.setDate(m.getDate()+6);
      const f = d => d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
      return f(m)+' – '+f(s)+' '+m.getFullYear();
    } catch(e){ return ds; }
  }
  bar.innerHTML = `
    <div class="net-stat">
      <div class="net-num">${totalFiled}</div>
      <div class="net-label">Stories filed</div>
    </div>
    <div class="net-divider"></div>
    <div class="net-stat">
      <div class="net-num">${totalStories - totalFiled}</div>
      <div class="net-label">Still to file</div>
    </div>
    <div class="net-divider"></div>
    <div class="net-stat">
      <div class="net-num">${REPORTERS.length}</div>
      <div class="net-label">Reporters</div>
    </div>
    <div class="net-divider"></div>
    <div class="net-track-wrap">
      <div class="net-track-label">Network progress — week of ${WEEK}</div>
      <div class="net-track"><div class="net-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="net-stat" style="text-align:right">
      <div class="net-num">${pct}%</div>
      <div class="net-label">Complete</div>
    </div>
  `;
}

function renderGrid() {
  const grid = document.getElementById('reporter-grid');
  grid.innerHTML = '';
  REPORTERS.forEach(r => {
    grid.appendChild(buildRepCard(r));
  });
}

function buildRepCard(r) {
  const data = getReporterData(r.name, r.pub);
  const filed = getFiledCount(data);
  const pct   = Math.round(filed / 8 * 100);
  const std   = [0,1,2,3,4].filter(i => data[STORY_DEFS[i].n] && data[STORY_DEFS[i].n].filed).length;
  const imp   = data['06'] && data['06'].filed ? 1 : 0;
  const life  = [6,7].filter(i => data[STORY_DEFS[i].n] && data[STORY_DEFS[i].n].filed).length;

  const card = document.createElement('div');
  card.className = 'rep-card';
  card.onclick = () => openDrill(r);

  const repDefs = getStoryDefs(r.pub);
  const storyRows = repDefs.map(s => {
    const st = data[s.n];
    const headline = st && st.headline ? st.headline : null;
    const fileDay  = st && st.file_day ? st.file_day : null;
    const isFiled  = st && st.filed;
    return `
      <div class="story-row">
        <span class="story-num">${s.n}</span>
        <span class="story-type-dot dot-${s.t}"></span>
        <span class="story-headline ${!headline?'empty':''}">${headline ? headline.substring(0,55)+(headline.length>55?'…':'') : 'No headline yet'}</span>
        <div class="story-meta">
          ${fileDay ? `<span class="story-day">${fileDay}</span>` : ''}
          <span class="${isFiled?'filed-tick':'not-filed'}">${isFiled?'✓':'○'}</span>
        </div>
      </div>`;
  }).join('');

  card.innerHTML = `
    <div class="rep-header">
      <div>
        <div class="rep-name">${r.name}</div>
        <div class="rep-pub">${r.pub}</div>
      </div>
      <div>
        <div class="rep-filed-big">${filed}/8</div>
        <div class="rep-filed-sub">stories filed</div>
      </div>
    </div>
    <div class="rep-progress">
      <div class="rep-track"><div class="rep-fill" style="width:${pct}%"></div></div>
      <div class="rep-pills">
        <span class="rpill rpill-std">${std}/5 standard</span>
        <span class="rpill rpill-imp">${imp}/1 impact</span>
        <span class="rpill rpill-life">${life}/2 ${r.pub.toLowerCase().includes('national') ? 'youtube/podcast' : 'lifestyle'}</span>
      </div>
    </div>
    <div class="rep-stories">${storyRows}</div>
  `;
  return card;
}

async function editorUpsert(row) {
  const filter = 'reporter=eq.' + encodeURIComponent(row.reporter) +
    '&publication=eq.' + encodeURIComponent(row.publication) +
    '&week_of=eq.' + encodeURIComponent(row.week_of) +
    '&story_num=eq.' + encodeURIComponent(row.story_num);
  const patchRes = await fetch(SUPA_URL + '/rest/v1/' + TABLE + '?' + filter, {
    method: 'PATCH',
    headers: {
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation',
    },
    body: JSON.stringify(row),
  });
  if (!patchRes.ok) throw new Error('PATCH ' + patchRes.status + ': ' + await patchRes.text());
  let updated = [];
  try { updated = await patchRes.json(); } catch(e) { updated = []; }
  if (!updated || updated.length === 0) {
    const postRes = await fetch(SUPA_URL + '/rest/v1/' + TABLE, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal',
      },
      body: JSON.stringify(row),
    });
    if (!postRes.ok) throw new Error('POST ' + postRes.status + ': ' + await postRes.text());
  }
}

async function clearNote(reporter, pub, week, storyNum, btnEl) {
  if (!confirm('Clear the note sent to this reporter?')) return;
  try {
    const existing = await supaFetch(
      TABLE + '?reporter=eq.' + encodeURIComponent(reporter) +
      '&publication=eq.' + encodeURIComponent(pub) +
      '&week_of=eq.' + encodeURIComponent(week) +
      '&story_num=eq.' + encodeURIComponent(storyNum) + '&select=*'
    );
    if (existing && existing.length > 0) {
      const row = Object.assign({}, existing[0], {
        editor_note: '',
        updated_at: new Date().toISOString()
      });
      await editorUpsert(row);
    }
    // Remove the existing-note display from the form
    const noteForm = btnEl.closest('.note-form');
    if (noteForm) {
      const existingEl = noteForm.querySelector('.existing-note');
      if (existingEl) existingEl.remove();
      const ta = noteForm.querySelector('textarea');
      if (ta) ta.value = '';
    }
    // Update local cache
    const key = reporter + '|' + pub;
    if (ALL_DATA[key] && ALL_DATA[key][storyNum]) {
      ALL_DATA[key][storyNum].editor_note = '';
    }
  } catch(e) {
    alert('Failed to clear note. Check your connection and try again.');
    console.error(e);
  }
}

async function sendNote(reporter, pub, week, storyNum, noteText, btnEl) {
  if (!noteText.trim()) return;
  try {
    // Step 1: fetch the existing row so we can preserve all reporter data
    const existing = await supaFetch(
      TABLE + '?reporter=eq.' + encodeURIComponent(reporter) +
      '&publication=eq.' + encodeURIComponent(pub) +
      '&week_of=eq.' + encodeURIComponent(week) +
      '&story_num=eq.' + encodeURIComponent(storyNum) + '&select=*'
    );
    let row;
    if (existing && existing.length > 0) {
      // Preserve all existing reporter data, just update editor_note
      row = Object.assign({}, existing[0], {
        editor_note: noteText.trim(),
        updated_at: new Date().toISOString()
      });
    } else {
      // Row doesn't exist yet — create minimal row with just the note
      row = {
        reporter, publication: pub, week_of: week, story_num: storyNum,
        headline: '', angle: '', notes: '', format: '', word_count: '',
        file_day: '', todo: [], posted: [], filed: false,
        editor_note: noteText.trim(),
        updated_at: new Date().toISOString()
      };
    }
    // Step 2: upsert via PATCH-then-POST (reliable)
    await editorUpsert(row);
    // Show confirmation
    const noteForm = btnEl.closest('.note-form');
    const sent = noteForm ? noteForm.querySelector('.note-sent') : null;
    const ta = noteForm ? noteForm.querySelector('textarea') : null;
    if (sent) { sent.style.display='block'; setTimeout(()=>sent.style.display='none',2500); }
    if (ta) ta.value = '';
    // Update existing note display in the form
    if (noteForm) {
      let existingEl = noteForm.querySelector('.existing-note');
      if (!existingEl) {
        existingEl = document.createElement('div');
        existingEl.className = 'existing-note';
        existingEl.innerHTML = '<div class="existing-note-label">Current note to reporter</div><span class="en-val"></span>';
        noteForm.insertBefore(existingEl, noteForm.firstChild);
      }
      const valEl = existingEl.querySelector('.en-val') || existingEl;
      if (valEl) valEl.textContent = noteText.trim();
      // Add a Clear button if the form doesn't have one yet
      const btnRow = noteForm.querySelector('.note-form-btns');
      if (btnRow && !btnRow.querySelector('.note-clear-btn')) {
        const clearBtn = document.createElement('button');
        clearBtn.className = 'note-clear-btn';
        clearBtn.textContent = 'Clear note';
        clearBtn.addEventListener('click', function() {
          clearNote(reporter, pub, week, storyNum, this);
        });
        const sendBtn = btnRow.querySelector('.note-send-btn');
        btnRow.insertBefore(clearBtn, sendBtn);
      }
    }
    // Update local cache
    if (!ALL_DATA[reporter+'|'+pub]) ALL_DATA[reporter+'|'+pub] = {};
    if (!ALL_DATA[reporter+'|'+pub][storyNum]) ALL_DATA[reporter+'|'+pub][storyNum] = {};
    ALL_DATA[reporter+'|'+pub][storyNum].editor_note = noteText.trim();
  } catch(e) {
    alert('Failed to send note. Check your connection and try again.');
    console.error(e);
  }
}

function openDrill(r) {
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('drilldown').style.display = 'block';
  document.getElementById('drill-name').textContent = r.name;
  document.getElementById('drill-pub').textContent  = r.pub;
  const data = getReporterData(r.name, r.pub);
  const container = document.getElementById('drill-stories');
  container.innerHTML = '';
  const defs = getStoryDefs(r.pub);
  defs.forEach(s => {
    container.appendChild(buildDrillCard(s, data[s.n], r.name, r.pub, WEEK));
  });
}

function closeDrill() {
  document.getElementById('drilldown').style.display = 'none';
  document.getElementById('main-view').style.display = 'block';
}

function buildDrillCard(s, st, r_name, r_pub, r_week) {
  const filed    = st && st.filed;
  const headline = st && st.headline ? st.headline : null;
  const angle    = st && st.angle    ? st.angle    : null;
  const notes    = st && st.notes    ? st.notes    : null;
  const fmt      = st && st.format   ? st.format   : null;
  const wc       = st && st.word_count ? st.word_count : null;
  const day      = st && st.file_day ? st.file_day : null;
  const todo     = st && st.todo     ? st.todo     : [];
  const posted   = st && st.posted   ? st.posted   : [];

  const todoChecks = TODO_ITEMS.map(t =>
    `<span class="dcheck ${todo.includes(t)?'done':'notdone'}">${t}</span>`
  ).join('');

  const postChecks = POST_ITEMS.map(p =>
    `<span class="dcheck ${posted.includes(p)?'done':'notdone'}">${p}</span>`
  ).join('');

  const div = document.createElement('div');
  div.className = 'drill-card';
  div.innerHTML = `
    <div class="drill-card-hdr ${s.t}">
      <div class="drill-num ${s.t}">${s.n}</div>
      <div style="flex:1;min-width:0">
        <div class="drill-type ${s.t}">${s.lbl}</div>
        <div class="drill-headline-hdr ${s.t} ${!headline?'empty':''}">${headline || 'No headline yet'}</div>
      </div>
      ${filed ? `<span class="drill-filed-badge ${s.t}">Filed</span>` : ''}
    </div>
    <div class="drill-body">
      <div class="drill-field">
        <div class="drill-field-label">Angle</div>
        <div class="drill-field-val ${!angle?'empty':''}">${angle || '—'}</div>
      </div>
      <div class="drill-field">
        <div class="drill-field-label">Notes</div>
        <div class="drill-field-val ${!notes?'empty':''}">${notes || '—'}</div>
      </div>
      <div class="drill-field">
        <div class="drill-field-label">Format</div>
        <div class="drill-field-val ${!fmt?'empty':''}">${fmt || '—'}</div>
      </div>
      <div class="drill-field">
        <div class="drill-field-label">Word count</div>
        <div class="drill-field-val ${!wc?'empty':''}">${wc || '—'}</div>
      </div>
      <div class="drill-field">
        <div class="drill-field-label">File by</div>
        <div class="drill-field-val ${!day?'empty':''}">${day || '—'}</div>
      </div>
      <div class="drill-field">
        <div class="drill-field-label">To do</div>
        <div class="drill-field-val"><div class="drill-checks">${todoChecks}</div></div>
      </div>
      <div class="drill-field">
        <div class="drill-field-label">Posted to</div>
        <div class="drill-field-val"><div class="drill-checks">${postChecks}</div></div>
      </div>
    </div>
  `;

  // Add note form separately to avoid nested template literal issues
  const noteForm = document.createElement('div');
  noteForm.className = 'note-form';
  const hasNote = !!(st && st.editor_note);
  const existingNote = hasNote
    ? '<div class="existing-note"><div class="existing-note-label">Current note to reporter</div>' + st.editor_note + '</div>'
    : '';
  noteForm.innerHTML = existingNote +
    '<textarea placeholder="Send a note to the reporter about this story..." id="note-' + s.n + '"></textarea>' +
    '<div class="note-form-btns">' +
      '<span class="note-sent">\u2713 Sent</span>' +
      (hasNote ? '<button class="note-clear-btn">Clear note</button>' : '') +
      '<button class="note-send-btn">Send note</button>' +
    '</div>';
  noteForm.querySelector('.note-send-btn').addEventListener('click', function() {
    const ta = noteForm.querySelector('textarea');
    sendNote(r_name, r_pub, r_week, s.n, ta.value, this);
  });
  const clearBtn = noteForm.querySelector('.note-clear-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', function() {
      clearNote(r_name, r_pub, r_week, s.n, this);
    });
  }
  div.querySelector('.drill-body').appendChild(noteForm);
  return div;
}

// Restore session on refresh
const editorSession = localStorage.getItem('gz_editor_session');
if (editorSession) {
  try {
    const sess = JSON.parse(editorSession);
    if (sess.pass === EDITOR_PASS && sess.week) {
      WEEK = sess.week;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('week-inp').value = WEEK;
      loadWeek();
    }
  } catch(e) {}
} else {
  const savedWeek = localStorage.getItem('gz_editor_week');
  if (savedWeek) document.getElementById('inp-week').value = savedWeek;
}
