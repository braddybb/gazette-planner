


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gazette News — Weekly Story Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0000EE;
  --blue-lt:#EEF0FF;
  --blue-dk:#0000AA;
  --ink:#111111;
  --white:#ffffff;
  --acid:#EEFF00;
  --acid-dk:#4A5200;
  --grey-lt:#F5F4F1;
  --grey-md:#888888;
  --grey-dk:#444444;
  --cream:#FFFDE7;
  --cream-dk:#6B4400;
  --border:#DDDDDD;
  --success:#15803D;
  --success-lt:#F0FDF4;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8f8f6;color:#111;min-height:100vh}

/* ── SETUP SCREEN ── */
#setup-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.setup-card{background:#fff;border:0.5px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:480px}
.setup-logo{font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--grey-md);text-transform:uppercase;margin-bottom:1.5rem}
.setup-title{font-size:28px;font-weight:600;color:var(--ink);margin-bottom:.5rem}
.setup-sub{font-size:14px;color:var(--grey-md);margin-bottom:2rem;line-height:1.5}
.setup-field{margin-bottom:1.25rem}
.setup-label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--grey-dk);margin-bottom:.5rem;display:block}
.setup-field input,.setup-field select{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none;transition:border-color .2s}
.setup-field input:focus,.setup-field select:focus{border-color:var(--blue)}
.setup-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem;transition:opacity .2s}
.setup-btn:hover{opacity:.88}
.setup-err{font-size:13px;color:#cc0000;margin-top:.5rem;display:none}

/* ── MAIN APP ── */
#app{display:none;min-height:100vh}

/* ── HEADER ── */
.app-header{background:var(--ink);padding:0 2rem;display:flex;align-items:center;height:52px;gap:1.5rem;position:sticky;top:0;z-index:100}
.app-wordmark{font-size:11px;font-weight:600;letter-spacing:.15em;color:#666;text-transform:uppercase}
.app-divider{width:1px;height:16px;background:#333}
.app-pub{font-size:13px;color:#aaa}
.app-reporter{font-size:13px;color:#fff;font-weight:500}
.header-spacer{flex:1}
.week-display{font-size:12px;color:#888;display:flex;align-items:center;gap:6px}
.week-display span{color:#aaa}
.change-week-btn{font-size:12px;color:#555;background:none;border:0.5px solid #333;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit}
.change-week-btn:hover{border-color:#555;color:#888}
.signout-btn{font-size:12px;color:#555;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px}
.signout-btn:hover{color:#888}

/* ── PROGRESS BAR ── */
.progress-section{background:#fff;border-bottom:0.5px solid var(--border);padding:1.25rem 2rem}
.prog-main{display:flex;align-items:center;gap:1.25rem;margin-bottom:1rem}
.prog-ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.prog-ring{transform:rotate(-90deg)}
.prog-ring-bg{fill:none;stroke:#EDEDED;stroke-width:6}
.prog-ring-fill{fill:none;stroke:var(--blue);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:175.93;stroke-dashoffset:175.93;
  transition:stroke-dashoffset .6s cubic-bezier(.2,.7,.3,1), stroke .4s}
.prog-ring-fill.complete{stroke:var(--success)}
.prog-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.prog-text{flex:1;min-width:0}
.prog-headline{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.prog-headline #prog-count{font-size:22px}
.prog-label{font-size:14px;font-weight:400;color:var(--grey-md)}
.prog-glance{display:flex;gap:5px;margin-top:8px}
.glance-dot{width:9px;height:9px;border-radius:50%;background:#E2E2E2;transition:background .3s, transform .3s}
.glance-dot.progress{background:#FFC53D}
.glance-dot.filed{background:var(--success)}
.glance-dot.pop{transform:scale(1.35)}
.prog-streak{display:flex;flex-direction:column;align-items:center;gap:0;padding:8px 16px;
  background:#FFF7ED;border:0.5px solid #FFE0B8;border-radius:12px;flex-shrink:0;transition:transform .25s}
.prog-streak.zero{opacity:.5;filter:grayscale(1)}
.prog-streak.bump{animation:streakBump .5s cubic-bezier(.2,.7,.3,1)}
@keyframes streakBump{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
.streak-flame{font-size:18px;line-height:1}
.streak-num{font-size:18px;font-weight:700;color:#C2410C;line-height:1.1}
.streak-label{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9A6440}
.prog-pills{display:flex;gap:8px;flex-wrap:wrap}
.ppill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:0.5px solid}
.ppill-std{background:var(--blue-lt);color:var(--blue-dk);border-color:#AABBEE}
.ppill-imp{background:#1a1a1a;color:#fff;border-color:#333}
.ppill-life{background:var(--cream);color:var(--cream-dk);border-color:#DDD0A0}

/* ── WEEK PICKER BANNER ── */
.week-banner{background:var(--blue-lt);border-bottom:1px solid #AABBEE;padding:.75rem 2rem;display:flex;align-items:center;gap:1rem}
.week-banner label{font-size:13px;color:var(--blue-dk);font-weight:500}
.week-banner input{border:1px solid #AABBEE;border-radius:6px;padding:5px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink);outline:none}
.week-banner input:focus{border-color:var(--blue)}
.week-save-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.week-save-btn:hover{opacity:.88}
.week-banner-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--blue-dk);font-size:18px;line-height:1}

/* ── STORY GRID ── */
.stories-grid{padding:1.75rem 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;max-width:1400px;margin:0 auto;align-items:start}

/* ── STORY CARD ── */
.story-card{background:#fff;border:0.5px solid var(--border);border-radius:14px;overflow:hidden;position:relative;
  transition:box-shadow .25s, transform .2s cubic-bezier(.2,.7,.3,1), opacity .3s}
.story-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.story-card.is-filed{opacity:.72}
.story-card.is-filed .card-hdr{filter:saturate(.6)}

/* Card opening spring */
.story-card.just-opened{animation:cardPop .35s cubic-bezier(.2,.7,.3,1)}
@keyframes cardPop{0%{transform:scale(.99)}50%{transform:scale(1.008)}100%{transform:scale(1)}}

.card-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;
  transition:background .35s ease, color .35s ease}

/* EMPTY state — muted, quiet. Card "lights up" once it has content (.has-content) */
.card-hdr.std{background:#F4F5FB}
.card-hdr.imp{background:#F3F3F3}
.card-hdr.life{background:#FBFBEF}
.card-hdr.std.has-content{background:var(--blue)}
.card-hdr.imp.has-content{background:var(--ink)}
.card-hdr.life.has-content{background:var(--acid)}

.hdr-num{font-size:32px;font-weight:600;line-height:1;min-width:42px;transition:color .35s ease}
/* empty num colours (muted) */
.hdr-num.std{color:#B9C2E8}
.hdr-num.imp{color:#C4C4C4}
.hdr-num.life{color:#C9CB9E}
/* filled num colours */
.card-hdr.has-content .hdr-num.std,.card-hdr.has-content .hdr-num.imp{color:#fff}
.card-hdr.has-content .hdr-num.life{color:var(--acid-dk)}

.hdr-info{flex:1;min-width:0}
.hdr-type{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;transition:color .35s ease}
/* empty type colours */
.hdr-type.std{color:#A7B0D8}
.hdr-type.imp{color:#AAA}
.hdr-type.life{color:#B0B27F}
.card-hdr.has-content .hdr-type.std{color:#AABBFF}
.card-hdr.has-content .hdr-type.imp{color:#777}
.card-hdr.has-content .hdr-type.life{color:var(--acid-dk)}

.hdr-preview{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;transition:color .35s ease}
/* empty preview colours */
.hdr-preview.std{color:#9AA5D0}
.hdr-preview.imp{color:#999}
.hdr-preview.life{color:#A9AB78}
.card-hdr.has-content .hdr-preview.std{color:#CCDDFF}
.card-hdr.has-content .hdr-preview.imp{color:#666}
.card-hdr.has-content .hdr-preview.life{color:#8B6500}

.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.filed-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:none}
.filed-pill.std{background:rgba(255,255,255,.2);color:#fff}
.filed-pill.imp{background:rgba(255,255,255,.15);color:#aaa}
.filed-pill.life{background:rgba(0,0,0,.1);color:var(--acid-dk)}
.filed-pill.show{display:block}

.hdr-chev{font-size:16px;transition:transform .2s}
.hdr-chev.std,.hdr-chev.imp{color:rgba(255,255,255,.6)}
.hdr-chev.life{color:var(--acid-dk)}
.hdr-chev.open{transform:rotate(180deg)}

.card-body{display:none;padding:1rem}
.card-body.open{display:block}

.cf{margin-bottom:12px}
.cf:last-child{margin-bottom:0}
.cl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--grey-md);margin-bottom:4px}
.cf input[type=text],.cf textarea{width:100%;border:0.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit;background:#fff;color:#111;outline:none;resize:vertical;transition:border-color .2s}
.cf input[type=text]:focus,.cf textarea:focus{border-color:var(--blue)}
.cf textarea{min-height:52px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.cxgroup{display:flex;flex-wrap:wrap;gap:4px 12px}
.cxgroup label{display:flex;align-items:center;gap:5px;font-size:13px;color:#111;cursor:pointer;white-space:nowrap}
.cxgroup input[type=checkbox],.cxgroup input[type=radio]{accent-color:var(--blue);width:13px;height:13px;cursor:pointer}

.save-card-btn{font-size:12px;font-weight:600;padding:5px 16px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;transition:opacity .2s}
.save-card-btn:hover{opacity:.85}
.save-card-btn.saving{opacity:.5;pointer-events:none}
.save-card-btn.saved{background:var(--success);}
.save-err{font-size:12px;color:#cc0000;display:none;align-self:center}
.save-err.show{display:block}
.clear-slot-btn{font-size:11px;color:var(--grey-md);background:none;border:0.5px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;font-family:inherit;margin-left:auto}
.clear-slot-btn:hover{color:#cc0000;border-color:#cc0000}
.filed-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.filed-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:#111;cursor:pointer}
.filed-label input[type=checkbox]{accent-color:var(--blue);width:15px;height:15px;cursor:pointer}
.filed-ok{font-size:12px;color:var(--success);display:none;align-items:center;gap:4px}
.stamp-overlay{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:10;
  margin:0;
}
.stamp{
  font-family:'Courier New',monospace;
  font-size:42px;
  font-weight:900;
  color:var(--blue);
  border:5px solid var(--blue);
  padding:6px 18px;
  letter-spacing:.15em;
  border-radius:4px;
  opacity:0;
  transform:rotate(-15deg) scale(2);
  text-transform:uppercase;
  text-shadow:2px 2px 0 rgba(0,0,255,.15);
  box-shadow:inset 0 0 0 2px rgba(0,0,255,.1);
}
@keyframes stampIn {
  0%   { opacity:0; transform:rotate(-15deg) scale(2.5); }
  40%  { opacity:1; transform:rotate(-15deg) scale(0.9); }
  55%  { opacity:1; transform:rotate(-15deg) scale(1.05); }
  70%  { opacity:1; transform:rotate(-15deg) scale(1); }
  85%  { opacity:1; transform:rotate(-15deg) scale(1); }
  100% { opacity:0; transform:rotate(-15deg) scale(1); }
}
.stamp.animate {
  animation: stampIn 1.2s cubic-bezier(.17,.67,.35,1.2) forwards;
}

.filed-ok.show{display:flex}

/* ── SAVING INDICATOR ── */
.editor-note-banner{
  background:#fff;
  border-left:3px solid var(--blue);
  border-radius:0 6px 6px 0;
  padding:10px 14px;
  margin:0 0 14px 0;
  display:flex;
  gap:10px;
  align-items:flex-start;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.editor-note-banner .en-label{
  font-weight:700;
  font-size:10px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--blue);
  white-space:nowrap;
  padding-top:2px;
  font-family:var(--mono, monospace);
}
.editor-note-banner .en-text{
  flex:1;
  font-size:13px;
  color:#333;
  line-height:1.5;
}
.save-toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;font-size:12px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-toast.show{opacity:1}

/* ── LOADING ── */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem}
.loading-spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--grey-md)}

/* ── Editorial Calendar Strip ── */
.cal-section{max-width:1400px;margin:0 auto;padding:1rem 2rem 3rem}
.cal-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.cal-head h2{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin:0}
.cal-head .cal-sub{font-size:12px;color:var(--grey-md)}
.cal-strip{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 16px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.cal-strip::-webkit-scrollbar{height:6px}
.cal-strip::-webkit-scrollbar-track{background:transparent}
.cal-strip::-webkit-scrollbar-thumb{background:#d8d8d2;border-radius:3px}
.cal-strip:hover::-webkit-scrollbar-thumb{background:#bdbdb5}
.cal-card{
  flex:0 0 260px;scroll-snap-align:start;
  background:#fff;border:0.5px solid var(--border);border-radius:14px;
  padding:16px;position:relative;cursor:default;
  transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s, border-color .18s;
  display:flex;flex-direction:column;gap:10px;min-height:120px;
}
.cal-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:#cfcfc8}
.cal-chip{
  align-self:flex-start;font-size:10.5px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;padding:4px 9px;border-radius:999px;
  background:var(--blue-lt);color:var(--blue-dk);white-space:nowrap;
}
.cal-chip.soon{background:#FFE8E0;color:#C2410C}
.cal-chip.tbc{background:#EDEDE8;color:#6B6B63}
.cal-moment{font-size:14px;font-weight:600;line-height:1.3;color:var(--ink);letter-spacing:-.01em}
.cal-why{font-size:12px;line-height:1.45;color:var(--grey-md);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.cal-card.expanded .cal-why{-webkit-line-clamp:unset;overflow:visible}
.cal-more{font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;align-self:flex-start;margin-top:-2px}
.cal-empty{font-size:13px;color:var(--grey-md);padding:1rem 0}


/* ── COMPLETION CELEBRATION ── */
#celebrate-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;display:none}
#celebrate-overlay.show{display:block}
.celebrate-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);
  background:#fff;border-radius:20px;padding:2.5rem 3rem;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.25);opacity:0;
  animation:celebrateIn .5s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes celebrateIn{to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.celebrate-emoji{font-size:56px;line-height:1;margin-bottom:.5rem;display:block;
  animation:celebrateEmoji .6s cubic-bezier(.2,.7,.3,1) .1s both}
@keyframes celebrateEmoji{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.2) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
.celebrate-title{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.02em;margin-bottom:.35rem}
.celebrate-sub{font-size:14px;color:var(--grey-md);line-height:1.5}
.confetti{position:absolute;width:10px;height:14px;top:-20px;opacity:0}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0)}
  100%{opacity:0;transform:translateY(105vh) rotate(720deg)}
}


/* Checkbox / radio satisfying bounce */
.cxgroup input[type=checkbox],.cxgroup input[type=radio]{transition:transform .12s cubic-bezier(.2,.7,.3,1.6)}
.cxgroup input[type=checkbox]:active,.cxgroup input[type=radio]:active{transform:scale(1.3)}
.cxgroup label:hover{color:var(--blue)}
.filed-label input[type=checkbox]:active{transform:scale(1.25)}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">Gazette News</div>
    <div class="setup-title">Weekly Story Planner</div>
    <div class="setup-sub">Enter your details to get started. Your stories save automatically and sync across devices.</div>
    <div class="setup-field">
      <label class="setup-label">Your name</label>
      <input type="text" id="inp-name" placeholder="e.g. Zara Cuthbertson" autocomplete="name">
    </div>
    <div class="setup-field">
      <label class="setup-label">Publication</label>
      <select id="inp-pub">
        <option value="">Select your publication...</option>
        <option>Mid North Coaster</option>
        <option>Eastern Melburnian</option>
        <option>West Vic Brolga — Wannon</option>
        <option>West Vic Brolga — Ballarat</option>
        <option>Gippsland Monitor</option>
        <option>North Shore Lorikeet</option>
        <option>National Account</option>
      </select>
    </div>
    <div class="setup-field">
      <label class="setup-label">Week of</label>
      <input type="date" id="inp-week" style="font-family:inherit">
    </div>
    <div class="setup-err" id="setup-err">Please fill in all fields.</div>
    <button class="setup-btn" onclick="startApp()">Open my planner</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <span class="app-wordmark">Gazette News</span>
    <div class="app-divider"></div>
    <span class="app-reporter" id="hdr-reporter"></span>
    <div class="app-divider"></div>
    <span class="app-pub" id="hdr-pub"></span>
    <div class="header-spacer"></div>
    <div class="week-display">
      <span>Week of</span>
      <strong id="hdr-week" style="color:#ccc"></strong>
    </div>
    <button class="change-week-btn" onclick="toggleWeekBanner()">Change week</button>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>

  <div class="week-banner" id="week-banner" style="display:none">
    <label>Change week to:</label>
    <input type="date" id="new-week-inp" style="font-family:inherit">
    <button class="week-save-btn" onclick="changeWeek()">Save</button>
    <button class="week-banner-close" onclick="toggleWeekBanner()">×</button>
  </div>

  <div class="progress-section">
    <div class="prog-main">
      <div class="prog-ring-wrap">
        <svg class="prog-ring" viewBox="0 0 64 64" width="64" height="64">
          <circle class="prog-ring-bg" cx="32" cy="32" r="28"/>
          <circle class="prog-ring-fill" id="prog-ring-fill" cx="32" cy="32" r="28"/>
        </svg>
        <span class="prog-ring-pct" id="prog-pct">0%</span>
      </div>
      <div class="prog-text">
        <div class="prog-headline"><span id="prog-count">0</span> <span class="prog-label">of 8 filed this week</span></div>
        <div class="prog-glance" id="prog-glance"></div>
      </div>
      <div class="prog-streak" id="prog-streak" title="Weeks in a row you've filed everything">
        <span class="streak-flame">&#128293;</span>
        <span class="streak-num" id="streak-num">0</span>
        <span class="streak-label">week streak</span>
      </div>
    </div>

async function supaFetch(method, path, body) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',

    },
    body: body ? JSON.stringify(body) : undefined,

  if (!res.ok) {

function getMondayOf(dateStr) {
  if (!dateStr) return dateStr;
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const diff = (day === 0) ? -6 : 1 - day; // adjust to Monday
  d.setDate(d.getDate() + diff);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return yyyy + '-' + mm + '-' + dd;
}

function formatWeek(dateStr) {
  if (!dateStr) return '';
  try {
    const mon = new Date(dateStr + 'T00:00:00');
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = d => d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    return fmt(mon) + ' – ' + fmt(sun) + ' ' + mon.getFullYear();
  } catch(e) { return dateStr; }
}

function toggleCard(num) {
  const body = document.getElementById('body-' + num);
  const chev = document.getElementById('chev-' + num);
  const card = document.getElementById('card-' + num);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  if (isOpen) {
    body.classList.remove('open');
    if (chev) chev.classList.remove('open');
  } else {
    body.classList.add('open');
    if (chev) chev.classList.add('open');
    // Spring pop on open
    if (card) {
      card.classList.remove('just-opened');
      void card.offsetWidth; // reflow to restart animation
      card.classList.add('just-opened');
      setTimeout(() => card.classList.remove('just-opened'), 400);
    }
  }
}

// Live-update a card's colour state as content changes
function refreshCardState(num) {
  const card = document.getElementById('card-' + num);
  if (!card) return;
  const hdr = card.querySelector('.card-hdr');
  if (!hdr) return;
  const has = storyHasContent(DATA[num]);
  hdr.classList.toggle('has-content', has);
}

function fieldUpdate(num, field, val) {
  if (!DATA[num]) DATA[num] = blankStory(num);
  DATA[num][field] = val;
  if (field === 'headline') {
    const p = document.getElementById('prev-' + num);
    if (p) p.textContent = val || emptyPrompt(num);
  }
  refreshCardState(num);
  scheduleSave(num);
}

function arrUpdate(num, field, val, checked) {
  if (!DATA[num]) DATA[num] = blankStory(num);
  let arr = DATA[num][field] || [];
  if (checked && !arr.includes(val)) arr = [...arr, val];
  if (!checked) arr = arr.filter(x => x !== val);
  DATA[num][field] = arr;
  refreshCardState(num);
  scheduleSave(num);
}

function setFiled(num, checked) {
  if (!DATA[num]) DATA[num] = blankStory(num);
  DATA[num].filed = checked;
  const card = document.getElementById('card-' + num);
  const pill = document.getElementById('fpill-' + num);
  const ok   = document.getElementById('fok-' + num);
  if (card) card.className = 'story-card' + (checked ? ' is-filed' : '');
  if (pill) pill.classList.toggle('show', checked);
  if (ok)   ok.classList.toggle('show', checked);
  refreshCardState(num); // keep header colour state correct
  if (checked) stampFiled(num);
  updateProgress();
  scheduleSave(num);
}

function stampFiled(num) {
  const card = document.getElementById('card-' + num);
  if (!card) return;
  // Remove any existing stamp
  const existing = card.querySelector('.stamp-overlay');
  if (existing) existing.remove();
  // Create overlay covering the whole card
  const overlay = document.createElement('div');
  overlay.className = 'stamp-overlay';
  const stamp = document.createElement('div');
  stamp.className = 'stamp';
  stamp.textContent = 'Filed';
  overlay.appendChild(stamp);
  card.appendChild(overlay);
  // Trigger animation on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      stamp.classList.add('animate');
    });
  });
  // Remove overlay after animation
  setTimeout(() => overlay.remove(), 1400);
}

function clearSlot(num, e) {
  e.stopPropagation();
  if (!confirm('Clear all data in this story slot?')) return;
  DATA[num] = {
    headline:'', angle:'', notes:'', format:'', word_count:'', file_day:'',
    todo:[], posted:[], filed:false, editor_note:''
  };
  // Save the cleared state immediately
  manualSave(num);
  // Rebuild just this card
  const grid = document.getElementById('stories-container').querySelector('.stories-grid');
  if (grid) {
    const idx = STORIES.findIndex(s => s.n === num);
    if (idx >= 0) {
      const old = document.getElementById('card-' + num);
      const newCard = buildCard(STORIES[idx], idx);
      if (old) old.replaceWith(newCard);
    }
  }
  updateProgress({ silent: true });
}

function initRealtime() {
  if (!USER || !WEEK) return;
  try {
    supabaseClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    // Unsubscribe from any previous channel
    if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
    realtimeChannel = supabaseClient
      .channel('reporter-stories')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'planner_stories',
        filter: 'reporter=eq.' + USER.name
      }, payload => {
        const row = payload.new;
        if (!row || row.week_of !== WEEK) return;
        const num = row.story_num;
        // ONLY sync editor_note — never overwrite reporter's own in-progress data
        if (!DATA[num]) DATA[num] = blankStory(num);
        const note = row.editor_note || '';
        const existing = DATA[num].editor_note || '';
        if (note !== existing) {
          DATA[num].editor_note = note;
          const body = document.getElementById('body-' + num);
          if (body) {
            const existingBanner = body.querySelector('.editor-note-banner');
            if (note) {
              if (existingBanner) {
                existingBanner.querySelector('.en-text').textContent = note;
              } else {
                const banner = document.createElement('div');
                banner.className = 'editor-note-banner';
                banner.innerHTML = '<span class="en-label">Editor</span><span class="en-text">' + esc(note) + '</span>';
                body.insertBefore(banner, body.firstChild);
              }
            } else if (existingBanner) {
              existingBanner.remove();
            }
          }
        }
      })
      .subscribe();
  } catch(e) {
    console.warn('Realtime not available, falling back to polling');
    setInterval(pollEditorNotes, 30000);
  }
}

async function pollEditorNotes() {
  if (!USER || !WEEK) return;
  try {
    const rows = await supaFetch('GET',
      TABLE + '?reporter=eq.' + encodeURIComponent(USER.name) +
      '&publication=eq.' + encodeURIComponent(USER.pub) +
      '&week_of=eq.' + encodeURIComponent(WEEK) + '&select=story_num,editor_note'
    );
    (rows || []).forEach(r => {
      const num = r.story_num;
      const note = r.editor_note || '';
      if (!DATA[num]) DATA[num] = blankStory(num);
      const existing = DATA[num].editor_note || '';
      if (note !== existing) {
        DATA[num].editor_note = note;
        const body = document.getElementById('body-' + num);
        if (body) {
          const existingBanner = body.querySelector('.editor-note-banner');
          if (note) {
            if (existingBanner) {
              existingBanner.querySelector('.en-text').textContent = note;
            } else {
              const banner = document.createElement('div');
              banner.className = 'editor-note-banner';
              banner.innerHTML = '<span class="en-label">Editor</span><span class="en-text">' + esc(note) + '</span>';
              body.insertBefore(banner, body.firstChild);
            }
          } else if (existingBanner) {
            existingBanner.remove();
          }
        }
      }
    });
  } catch(e) {}
}

let _lastFiledCount = 0;
let _progressInitialised = false;
const RING_CIRC = 175.93; // 2*pi*28

function updateProgress(opts) {
  opts = opts || {};
  const stories = STORIES.map(s => getStory(s.n));
  const total  = stories.filter(s => s.filed).length;
  const std    = [0,1,2,3,4].filter(i => stories[i].filed).length;
  const imp    = stories[5].filed ? 1 : 0;
  const life   = [6,7].filter(i => stories[i].filed).length;
  const pct    = Math.round(total / 8 * 100);

  document.getElementById('prog-count').textContent = total;
  document.getElementById('prog-pct').textContent   = pct + '%';

  // Ring
  const ring = document.getElementById('prog-ring-fill');
  if (ring) {
    ring.style.strokeDashoffset = RING_CIRC * (1 - total / 8);
    ring.classList.toggle('complete', total === 8);
  }

  document.getElementById('pill-std').textContent   = std + ' / 5 standard';
  document.getElementById('pill-imp').textContent   = imp + ' / 1 impact';
  const lifeLabel = (USER && USER.pub && USER.pub.toLowerCase().includes('national')) ? 'youtube / podcast' : 'lifestyle';
  document.getElementById('pill-life').textContent  = life + ' / 2 ' + lifeLabel;

  // Week-at-a-glance dots
  renderGlanceDots(stories);

  // Celebration on reaching 100% (only when it's a fresh completion, not initial load)
  if (total === 8 && _progressInitialised && _lastFiledCount < 8 && !opts.silent) {
    celebrateComplete();
    bumpStreak();
  }

  _lastFiledCount = total;
  _progressInitialised = true;
}

function renderGlanceDots(stories) {
  const wrap = document.getElementById('prog-glance');
  if (!wrap) return;
  let h = '';
  stories.forEach(st => {
    let cls = '';
    if (st.filed) cls = 'filed';
    else if (storyHasContent(st)) cls = 'progress';
    h += '<span class="glance-dot ' + cls + '"></span>';
  });
  wrap.innerHTML = h;
}

// ── Streak handling (stored per reporter+pub in localStorage) ──
function streakKey() {
  return 'gz_streak_' + (USER ? (USER.name + '|' + USER.pub) : 'anon');
}
function getStreak() {
  try { return JSON.parse(localStorage.getItem(streakKey())) || { count:0, lastWeek:null }; }
  catch(e) { return { count:0, lastWeek:null }; }
}
function renderStreak() {
  const s = getStreak();
  const el = document.getElementById('streak-num');
  const wrap = document.getElementById('prog-streak');
  if (el) el.textContent = s.count;
  if (wrap) wrap.classList.toggle('zero', s.count === 0);
}
function bumpStreak() {
  const s = getStreak();
  // Only count this week once
  if (s.lastWeek === WEEK) { renderStreak(); return; }
  // Consecutive if lastWeek was the previous Monday
  let newCount = 1;
  if (s.lastWeek) {
    const prev = new Date(s.lastWeek + 'T00:00:00');
    const cur  = new Date(WEEK + 'T00:00:00');
    const diffDays = Math.round((cur - prev) / 86400000);
    if (diffDays === 7) newCount = s.count + 1;
    else if (diffDays <= 0) newCount = s.count; // same/earlier, don't change
  }
  const updated = { count: newCount, lastWeek: WEEK };
  localStorage.setItem(streakKey(), JSON.stringify(updated));
  renderStreak();
  const wrap = document.getElementById('prog-streak');
  if (wrap) {
    wrap.classList.remove('bump'); void wrap.offsetWidth; wrap.classList.add('bump');
  }
}

// ── Completion celebration ──
const CELEBRATE_MESSAGES = [
  { emoji:'\uD83C\uDF89', title:'Week complete!', sub:'Every story filed. Big effort \u2014 nicely done.' },
  { emoji:'\u2705', title:'That\'s a wrap', sub:'All eight in. You\'ve earned the weekend.' },
  { emoji:'\uD83D\uDD25', title:'Full house', sub:'Everything filed. This is what a strong week looks like.' },
  { emoji:'\u2B50', title:'All done', sub:'Every slot filed. Genuinely great work this week.' },
  { emoji:'\uD83D\uDE80', title:'Cleared the board', sub:'Eight for eight. Momentum is a beautiful thing.' },
];
function celebrateComplete() {
  const overlay = document.getElementById('celebrate-overlay');
  if (!overlay) return;
  const msg = CELEBRATE_MESSAGES[Math.floor(Math.random() * CELEBRATE_MESSAGES.length)];
  overlay.innerHTML =
    '<div class="celebrate-card">' +
      '<span class="celebrate-emoji">' + msg.emoji + '</span>' +
      '<div class="celebrate-title">' + msg.title + '</div>' +
      '<div class="celebrate-sub">' + msg.sub + '</div>' +
    '</div>';
  // Confetti
  const colours = ['#0000EE','#EEFF00','#15803D','#FF6B35','#C2410C','#9db4ff'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colours[Math.floor(Math.random() * colours.length)];
    c.style.animation = 'confettiFall ' + (1.8 + Math.random() * 1.4) + 's ' + (Math.random() * 0.5) + 's ease-in forwards';
    overlay.appendChild(c);
  }
  overlay.classList.add('show');
  setTimeout(() => { overlay.classList.remove('show'); overlay.innerHTML = ''; }, 3400);
}

async function upsertRow(row) {
  // Use PATCH with return=representation so we can see if a row was actually updated
  const filter = 'reporter=eq.' + encodeURIComponent(row.reporter) +
    '&publication=eq.' + encodeURIComponent(row.publication) +
    '&week_of=eq.' + encodeURIComponent(row.week_of) +
    '&story_num=eq.' + encodeURIComponent(row.story_num);

  const patchRes = await fetch(SUPA_URL + '/rest/v1/' + TABLE + '?' + filter, {
    method: 'PATCH',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
    },
    body: JSON.stringify(row),
  });

  if (!patchRes.ok) {
    const errText = await patchRes.text();
    console.error('PATCH failed:', patchRes.status, errText);
    throw new Error('PATCH ' + patchRes.status + ': ' + errText);
  }

  // return=representation gives us the updated rows as an array
  let updatedRows = [];
  try { updatedRows = await patchRes.json(); } catch(e) { updatedRows = []; }

  if (!updatedRows || updatedRows.length === 0) {
    // No existing row — INSERT
    const postRes = await fetch(SUPA_URL + '/rest/v1/' + TABLE, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify(row),
    });
    if (!postRes.ok) {
      const errText = await postRes.text();
      console.error('POST failed:', postRes.status, errText);
      throw new Error('POST ' + postRes.status + ': ' + errText);
    }
  }
}

async function manualSave(num) {
  const btn = document.getElementById('savebtn-' + num);
  const err = document.getElementById('saveerr-' + num);
  if (btn) { btn.classList.add('saving'); btn.textContent = 'Saving...'; }
  if (err) err.classList.remove('show');
  if (!DATA[num]) DATA[num] = blankStory(num);
  const row = {
    reporter:    USER.name,
    publication: USER.pub,
    week_of:     WEEK,
    story_num:   num,
    headline:    DATA[num].headline    || '',
    angle:       DATA[num].angle       || '',
    notes:       DATA[num].notes       || '',
    format:      DATA[num].format      || '',
    word_count:  DATA[num].word_count  || '',
    file_day:    DATA[num].file_day    || '',
    todo:        DATA[num].todo        || [],
    posted:      DATA[num].posted      || [],
    filed:       !!DATA[num].filed,
    editor_note: DATA[num].editor_note || '',
    updated_at:  new Date().toISOString(),
  };
  try {
    await upsertRow(row);
    if (btn) { btn.classList.remove('saving'); btn.classList.add('saved'); btn.textContent = 'Saved ✓'; }
    setTimeout(() => {
      if (btn) { btn.classList.remove('saved'); btn.textContent = 'Save'; }
    }, 2000);
  } catch(e) {
    console.error('Manual save failed:', e);
    if (btn) { btn.classList.remove('saving'); btn.textContent = 'Save'; }
    if (err) err.classList.add('show');
  }
}

function scheduleSave(num) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveStory(num), 150);
}

async function saveStory(num) {
  if (!DATA[num]) return;
  const row = {
    reporter:    USER.name,
    publication: USER.pub,
    week_of:     WEEK,
    story_num:   num,
    headline:    DATA[num].headline    || '',
    angle:       DATA[num].angle       || '',
    notes:       DATA[num].notes       || '',
    format:      DATA[num].format      || '',
    word_count:  DATA[num].word_count  || '',
    file_day:    DATA[num].file_day    || '',
    todo:        DATA[num].todo        || [],
    posted:      DATA[num].posted      || [],
    filed:       !!DATA[num].filed,
    editor_note: DATA[num].editor_note || '',
    updated_at:  new Date().toISOString(),
  };
  try {
    await upsertRow(row);
    showToast();
  } catch(e) {
    console.error('Auto-save error:', e);
  }
}

function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

const saved = localStorage.getItem(LS_KEY);
if (saved) {
  try {
    const u = JSON.parse(saved);
    if (u.name && u.pub && u.week) {
      USER = { name: u.name, pub: u.pub };
      WEEK = u.week;
      document.getElementById('inp-name').value = u.name;
      document.getElementById('inp-pub').value  = u.pub;
      document.getElementById('inp-week').value  = u.week;
      showApp();
    }
  } catch(e) {}
}
